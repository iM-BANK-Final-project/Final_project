name: Bug report
description: 재현 가능한 오류나 예상과 다른 동작을 보고합니다.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: 어떤 문제가 발생했는지 설명해주세요.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: 재현 단계를 순서대로 적어주세요.
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: 기대한 동작을 적어주세요.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: 실제 동작을 적어주세요.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: 에러 로그, 스크린샷, 실행 환경을 적어주세요. 민감정보는 제거해주세요.

