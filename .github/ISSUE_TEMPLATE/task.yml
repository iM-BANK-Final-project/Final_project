name: Task
description: 구현, 문서, 설정 등 일반 작업을 등록합니다.
title: "[Task] "
labels: ["planning"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: 작업 목표를 적어주세요.
    validations:
      required: true
  - type: textarea
    id: todo
    attributes:
      label: To-do
      description: 필요한 작업을 체크리스트로 적어주세요.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      description: 완료 기준을 적어주세요.
    validations:
      required: true

