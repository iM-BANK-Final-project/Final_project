name: Data or analysis task
description: 데이터 정제, EDA, 지표 설계, 모델링 작업을 정의합니다.
title: "[Data] "
labels: ["data"]
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: 이 분석 또는 데이터 작업의 목적을 적어주세요.
      placeholder: 예) 최근 36개월 거래 패턴으로 법인고객 세그먼트를 정의한다.
    validations:
      required: true
  - type: textarea
    id: input
    attributes:
      label: Input data
      description: 사용할 데이터 범위, 테이블, 기간, 주요 컬럼을 적어주세요. 민감정보는 포함하지 마세요.
    validations:
      required: true
  - type: textarea
    id: method
    attributes:
      label: Method
      description: 예상 접근 방법, 지표, 모델, 검증 방식을 적어주세요.
  - type: textarea
    id: output
    attributes:
      label: Expected output
      description: 산출물을 적어주세요.
      placeholder: 예) EDA 노트북, 세그먼트 정의표, API 응답 스키마, 대시보드 지표
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy checklist
      options:
        - label: 원본 고객 식별자를 이슈에 직접 적지 않았습니다.
          required: true
        - label: 결과 공유 시 재식별 위험을 검토합니다.
          required: true

